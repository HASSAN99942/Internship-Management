name: mobile
description: "Internship Management & Student Monitoring Platform — Flutter client."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & API
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.6.1

  # Secure token storage (Keychain/Keystore on mobile, browser storage on web)
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.6.2

  # Fonts
  google_fonts: ^6.2.1

  # Serialisation
  json_annotation: ^4.9.0

  # File & media picking
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # Internationalisation / date formatting
  intl: ^0.19.0

  # Environment config
  flutter_dotenv: ^5.2.1

  # Open URLs in browser (CV download)
  url_launcher: ^6.3.1

  # Theme persistence
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation for JSON serialisation
  build_runner: ">=2.4.13 <2.5.0"
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - .env
